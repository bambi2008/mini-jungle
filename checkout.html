<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout — HK MiniJungle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .checkout-page {
      min-height: 100vh;
      background: #050505;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .checkout-card {
      width: 100%;
      max-width: 560px;
      background: #0A0A0A;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 2.5rem 2rem;
    }
    .checkout-back {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2rem;
      display: inline-block;
      transition: color 0.2s;
    }
    .checkout-back:hover { color: var(--accent); }
    .checkout-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }
    .checkout-product {
      font-size: 0.85rem;
      color: var(--accent);
      margin-bottom: 2rem;
      padding: 0.6rem 0.8rem;
      background: rgba(143,191,154,0.06);
      border: 1px solid rgba(143,191,154,0.1);
      border-radius: 3px;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem 0.8rem;
      background: #0D0D0D;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.04);
      margin: 1.5rem 0;
    }
    .checkout-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1rem;
      color: var(--white);
      margin-bottom: 1.5rem;
      padding: 0.8rem 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .checkout-total .amount {
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--accent);
    }
    .btn-pay {
      width: 100%;
      padding: 1rem;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 600;
      background: var(--moss);
      color: var(--white);
      border: 1px solid var(--moss-lit);
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all 0.25s ease;
      border-radius: 4px;
    }
    .btn-pay:hover { background: var(--moss-lit); }
    .secure-note {
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 1rem;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="checkout-page">
    <div class="checkout-card">
      <a href="/" class="checkout-back">&larr; Back to HK MiniJungle</a>
      <h1 class="checkout-title">Checkout</h1>
      <p class="checkout-sub" style="font-size:0.72rem;color:var(--text-dim);margin-bottom:1rem;"></p>
      <div class="checkout-product" id="checkoutProduct">Loading...</div>

      <form id="paymentForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" placeholder="+852" required>
        </div>
        <div class="form-group">
          <label>Shipping Address</label>
          <input type="text" placeholder="Street, District, Hong Kong" required>
        </div>
        <hr class="form-divider">
        <div class="form-row">
          <div class="form-group">
            <label>Card Number</label>
            <input type="text" placeholder="0000 0000 0000 0000" required>
          </div>
          <div class="form-group">
            <label>Expiry</label>
            <input type="text" placeholder="MM / YY" required>
          </div>
        </div>
        <div class="form-group">
          <label>CVC</label>
          <input type="text" placeholder="123" required>
        </div>
        <div class="checkout-total">
          <span>Total</span>
          <span class="amount" id="checkoutAmount">HK$---</span>
        </div>
        <button type="submit" class="btn-pay">Pay Securely</button>
        <p class="secure-note">&#9679; Stripe / Test Mode &mdash; No real charges</p>
      </form>
    </div>
  </div>

  <script>
    // Check login status
    const token = localStorage.getItem('mj_token');
    const customer = JSON.parse(localStorage.getItem('mj_customer') || 'null');

    if (!token || !customer) {
      // Not logged in — redirect to account page
      const returnUrl = encodeURIComponent(window.location.href);
      window.location.href = '/account.html?redirect=' + returnUrl;
    }

    // Show customer info
    if (customer) {
      document.querySelector('.checkout-sub').textContent = 'Logged in as ' + customer.email;
    }

    // Read product from URL
    const params = new URLSearchParams(window.location.search);
    const product = params.get('product') || 'HK MiniJungle';
    const price   = params.get('price') || '---';
    document.getElementById('checkoutProduct').textContent = product;
    document.getElementById('checkoutAmount').textContent = 'HK$' + price;

    document.getElementById('paymentForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Record order
      try {
        await fetch('/api/customers/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, product, price }),
        });
      } catch {}

      alert('Order placed! (Test mode — no charge)\n\nProduct: ' + product + '\nWe will contact you shortly.');
      window.location.href = '/';
    });
  </script>
</body>
</html>
