<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout — HK MiniJungle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .checkout-page { min-height:100vh;background:#050505;display:flex;align-items:center;justify-content:center;padding:2rem; }
    .checkout-card { width:100%;max-width:600px;background:#0A0A0A;border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:2.5rem 2rem; }
    .checkout-back { font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:2rem;display:inline-block;transition:color 0.2s;text-decoration:none; }
    .checkout-back:hover { color:var(--accent); }
    .checkout-title { font-size:1.4rem;font-weight:700;color:var(--white);letter-spacing:-0.02em;margin-bottom:0.3rem; }
    .checkout-sub { font-size:0.72rem;color:var(--text-dim);margin-bottom:1.5rem; }
    .order-summary { background:rgba(143,191,154,0.04);border:1px solid rgba(143,191,154,0.1);border-radius:4px;padding:1rem;margin-bottom:2rem; }
    .order-item { display:flex;justify-content:space-between;align-items:center;padding:0.3rem 0;font-size:0.82rem;color:var(--text); }
    .order-item .qty { color:var(--text-dim);font-size:0.7rem; }
    .order-total { display:flex;justify-content:space-between;align-items:center;padding-top:0.7rem;margin-top:0.5rem;border-top:1px solid rgba(255,255,255,0.06);font-size:0.95rem;font-weight:700;color:var(--white); }
    .order-total .amount { color:var(--accent);font-size:1.1rem; }
    .fg { margin-bottom:1.2rem; }
    .fg label { display:block;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.4rem; }
    .fg input { width:100%;padding:0.75rem 0.8rem;background:#0D0D0D;border:1px solid rgba(255,255,255,0.08);border-radius:3px;color:var(--text);font-family:var(--font-mono);font-size:0.85rem;transition:border-color 0.2s; }
    .fg input:focus { outline:none;border-color:var(--accent); }
    .fg-row { display:grid;grid-template-columns:1fr 1fr;gap:1rem; }
    .guest-note { font-size:0.7rem;color:var(--text-dim);text-align:center;margin:1rem 0;line-height:1.6; }
    .guest-note a { color:var(--accent);text-decoration:underline; }
    .btn-pay { width:100%;padding:1rem;font-size:0.85rem;letter-spacing:0.15em;text-transform:uppercase;font-weight:600;background:var(--moss);color:var(--white);border:1px solid var(--moss-lit);font-family:var(--font-mono);cursor:pointer;transition:all 0.25s;border-radius:4px; }
    .btn-pay:hover { background:var(--moss-lit); }
    .btn-pay:disabled { opacity:0.5;cursor:not-allowed; }
    .secure-note { text-align:center;font-size:0.65rem;color:var(--text-dim);margin-top:1.5rem;letter-spacing:0.08em;display:flex;align-items:center;justify-content:center;gap:0.5rem; }
    .opt-in { display:flex;align-items:flex-start;gap:0.5rem;margin:1rem 0;font-size:0.72rem;color:var(--text-dim); }
    .opt-in input { margin-top:0.15rem;accent-color:var(--accent); }
    .msg { font-size:0.75rem;margin-top:0.8rem;text-align:center;min-height:1.2em; }
    .msg.error { color:#E05555; }
    .msg.success { color:var(--accent); }
  </style>
</head>
<body>
  <div class="checkout-page">
    <div class="checkout-card">
      <a href="/" class="checkout-back">&larr; Back to HK MiniJungle</a>
      <h1 class="checkout-title">Checkout</h1>
      <p class="checkout-sub" id="loginNote"></p>

      <!-- Order summary from cart -->
      <div class="order-summary" id="orderSummary">
        <p style="color:var(--text-dim);font-size:0.78rem;">Loading cart...</p>
      </div>

      <form id="checkoutForm">
        <div class="fg"><label>Full Name</label><input name="name" type="text" placeholder="Your name" required></div>
        <div class="fg"><label>Email</label><input name="email" type="email" placeholder="you@example.com" required></div>
        <div class="fg-row">
          <div class="fg"><label>Phone</label><input name="phone" type="tel" placeholder="+852"></div>
          <div class="fg"><label>Postal Code</label><input name="zip" type="text" placeholder="---"></div>
        </div>
        <div class="fg"><label>Shipping Address</label><input name="address" type="text" placeholder="Street, District, Hong Kong" required></div>

        <!-- Optional account creation -->
        <label class="opt-in">
          <input type="checkbox" name="createAccount" checked>
          <span>Save my info and create an account for order tracking and future purchases.</span>
        </label>

        <p class="guest-note">
          No account required. You can checkout as a guest.<br>
          Already have an account? <a href="/account.html?redirect=/checkout.html">Sign in</a> for faster checkout.
        </p>

        <button type="submit" class="btn-pay" id="payBtn">Pay with Card</button>
        <p class="msg" id="payMsg"></p>
      </form>

      <p class="secure-note">
        <span>🔒</span> Secure payment powered by Stripe · Test Mode
      </p>
    </div>
  </div>

  <script>
    // ── Load cart from URL ──
    const params = new URLSearchParams(window.location.search);
    let cartItems = [];
    try { cartItems = JSON.parse(params.get('items') || '[]'); } catch { cartItems = []; }

    // If no cart items, check localStorage
    if (cartItems.length === 0) {
      try { cartItems = JSON.parse(localStorage.getItem('mj_cart') || '[]'); } catch {}
    }

    const total = cartItems.reduce((s, i) => s + (parseFloat(i.price) || 0) * i.qty, 0);

    // ── Render order summary ──
    const summary = document.getElementById('orderSummary');
    if (cartItems.length === 0) {
      summary.innerHTML = '<p style="color:#E05555;font-size:0.78rem;">Your cart is empty. <a href="/" style="color:var(--accent);">Go back and add items.</a></p>';
      document.getElementById('payBtn').disabled = true;
    } else {
      summary.innerHTML = cartItems.map(i => `
        <div class="order-item"><span>${i.name}</span><span class="qty">&times;${i.qty} &nbsp; HK$${i.price}</span></div>
      `).join('') + `
        <div class="order-total"><span>Total</span><span class="amount">HK$${total.toLocaleString()}</span></div>
      `;
    }

    // ── Login status ──
    const token = localStorage.getItem('mj_token');
    const customer = JSON.parse(localStorage.getItem('mj_customer') || 'null');
    const note = document.getElementById('loginNote');
    if (customer) {
      note.textContent = 'Signed in as ' + customer.email;
      document.querySelector('input[name="name"]').value = customer.name || '';
      document.querySelector('input[name="email"]').value = customer.email || '';
      document.querySelector('input[name="phone"]').value = customer.phone || '';
    } else {
      note.textContent = 'Guest checkout — no account needed.';
    }

    // ── Submit → Stripe ──
    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('payMsg');
      const btn = document.getElementById('payBtn');
      msg.className = 'msg';
      msg.textContent = 'Redirecting to secure payment...';
      btn.disabled = true;

      const formData = new FormData(e.target);
      const createAccount = formData.get('createAccount') === 'on';

      try {
        // Call backend to create Stripe Checkout Session
        const res = await fetch('/api/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            items: cartItems,
            customer: {
              name: formData.get('name'),
              email: formData.get('email'),
              phone: formData.get('phone'),
              address: formData.get('address'),
              zip: formData.get('zip'),
            },
            createAccount,
            token,
          }),
        });

        const data = await res.json();

        if (data.url) {
          // Clear cart
          localStorage.removeItem('mj_cart');
          // Redirect to Stripe Checkout
          window.location.href = data.url;
        } else {
          // Fallback: show success message (demo mode)
          msg.className = 'msg success';
          msg.textContent = 'Order placed! (Demo mode — Stripe key not configured)';
          localStorage.removeItem('mj_cart');
          btn.disabled = false;
        }
      } catch (err) {
        // Demo fallback
        msg.className = 'msg success';
        msg.textContent = 'Order placed! (Demo mode — server may be offline)';
        localStorage.removeItem('mj_cart');

        // Trigger email confirmation
        const email = formData.get('email');
        if (email) {
          window.postMessage({ type: 'order-placed', email, items: cartItems }, '*');
        }

        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
